<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Happy Paws Adopter account to check adoption applications, donate, and volunteer schedules.">
  <title>Login | Happy Paws Pet Adoption</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <main class="container-fluid p-0 overflow-hidden">
    <div class="row g-0 min-vh-100">
      
      <!-- Split Left Column: Images (Desktop Only) -->
      <div class="col-lg-6 d-none d-lg-block auth-split-img" style="background-image: url('https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=1000&q=80');">
        <div class="h-100 w-100 bg-secondary-custom d-flex flex-column justify-content-end p-5 text-white" style="--bs-bg-opacity: 0.45;">
          <h2 class="display-5 fw-bold text-white mb-2">Welcome Back!</h2>
          <p class="lead text-white-50">Log in to track your adoption applications, schedule volunteer slots, or manage recurring sponsorships.</p>
        </div>
      </div>

      <!-- Split Right Column: Login Card -->
      <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white py-5 px-4">
        <div class="w-100" style="max-width: 450px;">
          
          <!-- Brand Logo back link -->
          <div class="text-center mb-4">
            <a href="index.html" class="navbar-brand text-secondary-custom d-inline-flex align-items-center fs-3">
              <i class="bi bi-paw-fill text-primary-custom me-2" aria-hidden="true"></i>
              <span class="fw-bold">Happy Paws</span>
            </a>
          </div>

          <h2 class="fw-bold text-secondary-custom mb-2 text-center text-lg-start">Sign In</h2>
          <p class="text-muted mb-4 small text-center text-lg-start">Access your adopter profile and rescue milestones.</p>

          <!-- Login Form -->
          <form id="adopterLoginForm">
            
            <!-- Email -->
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
              <label for="loginEmail">Email Address</label>
            </div>

            <!-- Password -->
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
              <label for="loginPassword">Password</label>
            </div>

            <!-- Remember me & forgot password -->
            <div class="d-flex justify-content-between align-items-center mb-4 small">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label text-muted" for="rememberMe">
                  Remember Me
                </label>
              </div>
              <a href="#" class="text-primary-custom fw-semibold">Forgot Password?</a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary-custom w-100 py-3 shadow mb-4">Sign In</button>

            <!-- Social Connectors -->
            <div class="text-center mb-4">
              <span class="text-muted small position-relative px-2 bg-white" style="z-index: 10;">Or Continue With</span>
              <hr class="mt-2 mb-4" style="margin-top: -10px !important;">
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary w-50 py-2 d-flex align-items-center justify-content-center gap-2 small">
                  <i class="bi bi-google text-danger"></i> Google
                </button>
                <button type="button" class="btn btn-outline-secondary w-50 py-2 d-flex align-items-center justify-content-center gap-2 small">
                  <i class="bi bi-facebook text-primary"></i> Facebook
                </button>
              </div>
            </div>

            <!-- Register callout -->
            <p class="text-center text-muted small mb-0">Don't have an adopter profile yet? <a href="register.html" class="text-primary-custom fw-semibold">Register here</a></p>

          </form>

        </div>
      </div>

    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Interactive script -->
  <script>
    document.getElementById('adopterLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Login Simulation Successful! Welcome back to Happy Paws.');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
